<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMINA BLE Control</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        h1 { text-align: center; font-weight: 800; letter-spacing: -1px; margin: 20px 0; }
        .card {
            background: var(--card);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-power { background: #ef4444; color: white; }
        .btn-color { aspect-ratio: 1; border-radius: 50%; padding: 0; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .label { font-size: 12px; font-weight: 700; color: #94a3b8; text-transform: uppercase; margin-bottom: 12px; }
        input[type="range"] { width: 100%; margin: 10px 0; }
        #status { font-size: 12px; text-align: center; color: #94a3b8; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>LUMINA BLE</h1>
        
        <button id="connectBtn" class="btn btn-primary">CONNECT LAMP</button>
        
        <div id="controls" class="hidden">
            <div class="card">
                <button id="powerBtn" class="btn btn-power">POWER OFF</button>
            </div>

            <div class="card">
                <div class="label">Color Wheel</div>
                <div style="display:flex; justify-content:center;">
                    <input type="color" id="colorPicker" value="#ffffff" style="width:100px; height:100px; border:none; border-radius:50%; cursor:pointer;">
                </div>
            </div>

            <div class="card">
                <div class="label">Brightness</div>
                <input type="range" id="brightness" min="5" max="255" value="200">
            </div>

            <div class="card">
                <div class="label">Moods</div>
                <div class="grid">
                    <button class="btn btn-primary" onclick="setAnim(1)">RBW</button>
                    <button class="btn btn-primary" onclick="setAnim(2)">PLS</button>
                    <button class="btn btn-primary" onclick="setAnim(3)">CHS</button>
                    <button class="btn btn-primary" onclick="setAnim(9)">FLM</button>
                </div>
            </div>
        </div>

        <div id="status">Bluetooth Ready</div>
    </div>

    <script>
        const SERVICE_UUID = "19b10000-e8f2-537e-4f6c-d104768a1214";
        const CHAR_POWER = "19b10001-e8f2-537e-4f6c-d104768a1214";
        const CHAR_COLOR = "19b10002-e8f2-537e-4f6c-d104768a1214";
        const CHAR_BRIGHTNESS = "19b10003-e8f2-537e-4f6c-d104768a1214";
        const CHAR_ANIMATION = "19b10004-e8f2-537e-4f6c-d104768a1214";

        let device, server, service;
        let characteristics = {};

        const connectBtn = document.getElementById('connectBtn');
        const controls = document.getElementById('controls');
        const status = document.getElementById('status');

        connectBtn.onclick = async () => {
            try {
                status.innerText = "Requesting device...";
                device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'LUMINA_Lamp' }],
                    optionalServices: [SERVICE_UUID]
                });

                status.innerText = "Connecting to GATT...";
                server = await device.gatt.connect();
                service = await server.getPrimaryService(SERVICE_UUID);

                characteristics.power = await service.getCharacteristic(CHAR_POWER);
                characteristics.color = await service.getCharacteristic(CHAR_COLOR);
                characteristics.brightness = await service.getCharacteristic(CHAR_BRIGHTNESS);
                characteristics.animation = await service.getCharacteristic(CHAR_ANIMATION);

                connectBtn.classList.add('hidden');
                controls.classList.remove('hidden');
                status.innerText = "CONNECTED";
                
                device.addEventListener('gattserverdisconnected', () => {
                    controls.classList.add('hidden');
                    connectBtn.classList.remove('hidden');
                    status.innerText = "DISCONNECTED";
                });

            } catch (e) {
                console.error(e);
                status.innerText = "ERROR: " + e.message;
            }
        };

        document.getElementById('powerBtn').onclick = async () => {
            const val = await characteristics.power.readValue();
            const isOn = val.getUint8(0) === 1;
            await characteristics.power.writeValue(new Uint8Array([isOn ? 0 : 1]));
            document.getElementById('powerBtn').innerText = isOn ? "POWER ON" : "POWER OFF";
            document.getElementById('powerBtn').style.background = isOn ? "#22c55e" : "#ef4444";
        };

        document.getElementById('colorPicker').onchange = async (e) => {
            const hex = e.target.value;
            const r = parseInt(hex.slice(1,3), 16);
            const g = parseInt(hex.slice(3,5), 16);
            const b = parseInt(hex.slice(5,7), 16);
            await characteristics.color.writeValue(new Uint8Array([r, g, b]));
        };

        document.getElementById('brightness').onchange = async (e) => {
            await characteristics.brightness.writeValue(new Uint8Array([parseInt(e.target.value)]));
        };

        window.setAnim = async (id) => {
            await characteristics.animation.writeValue(new Uint8Array([id]));
        };
    </script>
</body>
</html>
