<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMINA BLE Control</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --accent: #22c55e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        h1 { text-align: center; font-weight: 800; letter-spacing: -1px; margin: 10px 0; color: white; }
        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
        }
        .btn-connect { background: var(--primary); margin-bottom: 10px; }
        .btn-power { background: #ef4444; }
        .btn-anim { background: #475569; font-size: 11px; padding: 10px 5px; }
        .btn-anim.active { background: var(--accent); }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .label { font-size: 11px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px; }
        .flex-center { display: flex; justify-content: center; align-items: center; }
        
        input[type="range"] { width: 100%; height: 6px; background: #334155; border-radius: 3px; outline: none; -webkit-appearance: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: var(--primary); border-radius: 50%; cursor: pointer; }
        
        input[type="color"] { width: 80px; height: 80px; border: none; border-radius: 50%; cursor: pointer; background: none; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 50%; box-shadow: 0 0 15px rgba(0,0,0,0.3); }
        
        #status { font-size: 10px; text-align: center; color: #64748b; margin-top: 10px; font-weight: 700; }
        .hidden { display: none; }
        .speed-labels { display: flex; justify-content: space-between; font-size: 9px; color: #64748b; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>LUMINA BLE</h1>
        
        <button id="connectBtn" class="btn btn-connect">CONNECT TO LAMP</button>
        
        <div id="controls" class="hidden">
            <div class="card">
                <button id="powerBtn" class="btn btn-power">POWER OFF</button>
            </div>

            <div class="grid" style="grid-template-columns: 1fr 2fr;">
                <div class="card flex-center" style="flex-direction: column;">
                    <div class="label">Color</div>
                    <input type="color" id="colorPicker" value="#ffffff">
                </div>
                <div class="card" style="display:flex; flex-direction:column; justify-content:center;">
                    <div class="label">Brightness</div>
                    <input type="range" id="brightness" min="5" max="255" value="200">
                    <div class="label" style="margin-top:15px; margin-bottom:5px;">Speed</div>
                    <input type="range" id="speed" min="10" max="500" value="50" dir="rtl">
                    <div class="speed-labels"><span>FAST</span><span>SLOW</span></div>
                </div>
            </div>

            <div class="card">
                <div class="label">Animations & Moods</div>
                <div class="grid">
                    <button class="btn btn-anim" onclick="setAnim(1)">RAINBOW</button>
                    <button class="btn btn-anim" onclick="setAnim(2)">PULSE</button>
                    <button class="btn btn-anim" onclick="setAnim(3)">CHASE</button>
                    <button class="btn btn-anim" onclick="setAnim(4)">BLINK</button>
                    <button class="btn btn-anim" onclick="setAnim(5)">FADE</button>
                    <button class="btn btn-anim" onclick="setAnim(6)">SUNRISE</button>
                    <button class="btn btn-anim" onclick="setAnim(7)">SUNSET</button>
                    <button class="btn btn-anim" onclick="setAnim(8)">WAVES</button>
                    <button class="btn btn-anim" onclick="setAnim(9)">FLAME</button>
                </div>
            </div>
        </div>

        <div id="status">READY TO SCAN</div>
    </div>

    <script>
        const SERVICE_UUID = "19b10000-e8f2-537e-4f6c-d104768a1214";
        const CHAR_UUIDS = {
            power: "19b10001-e8f2-537e-4f6c-d104768a1214",
            color: "19b10002-e8f2-537e-4f6c-d104768a1214",
            brightness: "19b10003-e8f2-537e-4f6c-d104768a1214",
            animation: "19b10004-e8f2-537e-4f6c-d104768a1214",
            speed: "19b10005-e8f2-537e-4f6c-d104768a1214"
        };

        let device, server, service;
        let chars = {};

        const connectBtn = document.getElementById('connectBtn');
        const controls = document.getElementById('controls');
        const status = document.getElementById('status');

        connectBtn.onclick = async () => {
            try {
                status.innerText = "SEARCHING FOR LUMINA_LAMP...";
                device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'LUMINA_Lamp' }],
                    optionalServices: [SERVICE_UUID]
                });

                status.innerText = "CONNECTING...";
                server = await device.gatt.connect();
                service = await server.getPrimaryService(SERVICE_UUID);

                // Get all characteristics
                for (let key in CHAR_UUIDS) {
                    chars[key] = await service.getCharacteristic(CHAR_UUIDS[key]);
                }

                connectBtn.classList.add('hidden');
                controls.classList.remove('hidden');
                status.innerText = "CONNECTED TO LAMP";
                
                // Read initial state
                updateUIFromLamp();

                device.addEventListener('gattserverdisconnected', () => {
                    controls.classList.add('hidden');
                    connectBtn.classList.remove('hidden');
                    status.innerText = "DISCONNECTED";
                });

            } catch (e) {
                console.error(e);
                status.innerText = "CONNECTION FAILED: " + e.message;
            }
        };

        async function updateUIFromLamp() {
            try {
                const pVal = await chars.power.readValue();
                const isOn = pVal.getUint8(0) === 1;
                document.getElementById('powerBtn').innerText = isOn ? "POWER OFF" : "POWER ON";
                document.getElementById('powerBtn').style.background = isOn ? "#ef4444" : "#22c55e";

                const bVal = await chars.brightness.readValue();
                document.getElementById('brightness').value = bVal.getUint8(0);

                const sVal = await chars.speed.readValue();
                document.getElementById('speed').value = sVal.getUint16(0, true);
            } catch (e) { console.warn("Initial read failed", e); }
        }

        document.getElementById('powerBtn').onclick = async () => {
            try {
                const val = await chars.power.readValue();
                const current = val.getUint8(0);
                const next = current === 1 ? 0 : 1;
                await chars.power.writeValue(new Uint8Array([next]));
                document.getElementById('powerBtn').innerText = next === 1 ? "POWER OFF" : "POWER ON";
                document.getElementById('powerBtn').style.background = next === 1 ? "#ef4444" : "#22c55e";
            } catch (e) { status.innerText = "POWER CMD FAILED"; }
        };

        document.getElementById('colorPicker').onchange = async (e) => {
            try {
                const hex = e.target.value;
                const r = parseInt(hex.slice(1,3), 16);
                const g = parseInt(hex.slice(3,5), 16);
                const b = parseInt(hex.slice(5,7), 16);
                await chars.color.writeValue(new Uint8Array([r, g, b]));
            } catch (e) { status.innerText = "COLOR CMD FAILED"; }
        };

        document.getElementById('brightness').oninput = async (e) => {
            try {
                await chars.brightness.writeValue(new Uint8Array([parseInt(e.target.value)]));
            } catch (e) { status.innerText = "BRIGHTNESS CMD FAILED"; }
        };

        document.getElementById('speed').oninput = async (e) => {
            try {
                const val = parseInt(e.target.value);
                const data = new Uint16Array([val]);
                await chars.speed.writeValue(data.buffer);
            } catch (e) { status.innerText = "SPEED CMD FAILED"; }
        };

        window.setAnim = async (id) => {
            try {
                // Remove active class from all
                document.querySelectorAll('.btn-anim').forEach(b => b.classList.remove('active'));
                // Add to clicked (we'll assume success for UI responsiveness)
                event.target.classList.add('active');
                await chars.animation.writeValue(new Uint8Array([id]));
            } catch (e) { 
                status.innerText = "ANIMATION CMD FAILED";
                event.target.classList.remove('active');
            }
        };
    </script>
</body>
</html>
